apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-runner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: default

  source:
    repoURL: 'https://github.com/nel-thedev/k3s-arda.git'
    targetRevision: main
    path: apps/github-runner

  destination:
    server: https://kubernetes.default.svc
    namespace: github-runner

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true