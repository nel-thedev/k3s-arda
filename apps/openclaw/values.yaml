app-template:
  configMode: merge

  controllers:
    main:
      strategy: Recreate

      containers:
        main:
          envFrom:
            - secretRef:
                name: openclaw-env

        chromium:
          enabled: true

  persistence:
    data:
      enabled: true
      type: pvc
      accessMode: ReadWriteOnce
      size: 5Gi
      # storageClass: nfs-client   # <- uncomment if you need a specific SC

  service:
    main:
      enabled: true
      type: ClusterIP
      ports:
        http:
          port: 18789

  ingress:
    main:
      enabled: false

  configMaps:
    config:
      enabled: true
      data:
        openclaw.json: |
          {
            "gateway": {
              "host": "0.0.0.0",
              "port": 18789,
              "mode": "local",
              "trustedProxies": ["10.0.0.1"],
              "controlUi": {
                "allowedOrigins": [
                  "https://openclaw.hexagonlabs.cloud"
                ]
              }
            }
          }