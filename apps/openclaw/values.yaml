openclaw:
  app-template:
    configMode: merge

    controllers:
      main:
        initContainers:
          init-playwright:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "{{ .Values.openclawVersion }}"
            command:
              - sh
              - -c
              - |
                log() { echo "[$(date -Iseconds)] [init-playwright] $*"; }

                log "Installing Playwright into PVC (idempotent)"
                export HOME=/tmp
                export NPM_CONFIG_CACHE=/tmp/.npm
                export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

                mkdir -p /home/node/.openclaw
                cd /home/node/.openclaw

                if [ ! -d node_modules/playwright ]; then
                  npm init -y >/dev/null 2>&1 || true
                  npm install playwright
                  log "Playwright installed"
                else
                  log "Playwright already present"
                fi
            env:
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm
              PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env
            env:
              NODE_PATH: /home/node/.openclaw/node_modules

          # Chromium sidecar (NOW VNC/noVNC-capable so you can watch + intervene)
          chromium:
            enabled: true
            image:
              repository: selenium/standalone-chrome
              tag: "latest"
            # Keep resource settings similar to what you had
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "bind": "lan",
                "mode": "local",
                "controlUi": {
                  "allowedOrigins": [
                    "https://openclaw.hexagonlabs.cloud",
                    "http://openclaw.hexagonlabs.cloud",
                    "http://localhost:18789",
                    "http://127.0.0.1:18789"
                  ]
                }
              },
              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "openai/gpt-5.2"
                  },
                  "userTimezone": "America/New_York",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 1
                }
              },
              "channels": {
                "whatsapp": {
                  "selfChatMode": true,
                  "dmPolicy": "pairing"
                }
              },
              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "remoteCdpTimeoutMs": 30000,
                "remoteCdpHandshakeTimeoutMs": 15000,
                "profiles": {
                  "default": {
                    "cdpUrl": "http://127.0.0.1:9222",
                    "color": "#4285F4"
                  }
                }
              },
              "tools": {
                "deny": []
              }
            }

    # Services
    #
    # - main service stays on 18789 (gateway)
    # - add a NodePort for noVNC so you can watch/intervene in the browser
    #
    # NOTE: If you *don’t* want the gateway itself on NodePort, keep `type: ClusterIP`
    # and only expose noVNC separately (we can split into two services if your schema
    # complains). Start with this; if Argo complains, tell me the schema error and
    # I’ll adjust to the chart’s supported service layout.
    service:
      main:
        type: NodePort
        ports:
          http:
            port: 18789
          novnc:
            port: 7900
            nodePort: 30790

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        size: 5Gi
        advancedMounts:
          main:
            init-playwright:
              - path: /home/node/.openclaw
            main:
              - path: /home/node/.openclaw

      tmp:
        enabled: true
        advancedMounts:
          main:
            init-playwright:
              - path: /tmp
            main:
              - path: /tmp
            chromium:
              - path: /tmp

      shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          main:
            chromium:
              - path: /dev/shm