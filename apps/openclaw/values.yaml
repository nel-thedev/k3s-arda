openclaw:
  app-template:
    configMode: merge

    controllers:
      main:
        initContainers:
          init-playwright:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "{{ .Values.openclawVersion }}"
            command:
              - sh
              - -c
              - |
                log() { echo "[$(date -Iseconds)] [init-playwright] $*"; }

                log "Installing Playwright into PVC (idempotent)"
                export HOME=/tmp
                export NPM_CONFIG_CACHE=/tmp/.npm
                export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

                mkdir -p /home/node/.openclaw
                cd /home/node/.openclaw

                if [ ! -d node_modules/playwright ]; then
                  npm init -y >/dev/null 2>&1 || true
                  npm install playwright
                  log "Playwright installed"
                else
                  log "Playwright already present"
                fi
            env:
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm
              PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env
            env:
              NODE_PATH: /home/node/.openclaw/node_modules

          chromium:
            enabled: true

            image:
              repository: zenika/alpine-chrome
              tag: "124"

            env:
              HOME: /tmp
              XDG_CONFIG_HOME: /tmp/.chromium
              XDG_CACHE_HOME: /tmp/.chromium-cache
              DBUS_SESSION_BUS_ADDRESS: "unix:path=/dev/null"

            command:
              - sh
              - -lc
              - |
                set -e
                mkdir -p /tmp/chrome-profile /tmp/.chromium /tmp/.chromium-cache

                while true; do
                  echo "[$(date -Iseconds)] [chromium] starting google-chrome (CDP :9222)"
                  google-chrome \
                    --headless=new \
                    --no-sandbox \
                    --disable-gpu \
                    --disable-dev-shm-usage \
                    --remote-debugging-address=0.0.0.0 \
                    --remote-debugging-port=9222 \
                    --user-data-dir=/tmp/chrome-profile \
                    --no-first-run \
                    --no-default-browser-check \
                    --disable-background-networking \
                    --disable-features=UseDBus,Vulkan,VaapiVideoDecoder,AcceleratedVideoDecodeLinuxGL \
                    --disable-vulkan \
                    --use-gl=swiftshader \
                    --disable-software-rasterizer=false \
                    --disable-breakpad \
                    --disable-crash-reporter \
                    --metrics-recording-only \
                    --disable-component-update \
                    --disable-sync \
                    --disable-translate

                  echo "[$(date -Iseconds)] [chromium] google-chrome exited (code=$?) - restarting in 2s"
                  sleep 2
                done

            ports:
              - name: cdp
                containerPort: 9222

            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 4Gi

            probes:
              startup:
                enabled: false
                custom: true
                spec:
                  exec:
                    command: ["sh", "-lc", "wget -qO- http://127.0.0.1:9222/json/version >/dev/null"]
                  initialDelaySeconds: 2
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 60

              readiness:
                enabled: false
                custom: true
                spec:
                  exec:
                    command: ["sh", "-lc", "wget -qO- http://127.0.0.1:9222/json/version >/dev/null"]
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 12

              liveness:
                enabled: false
                custom: true
                spec:
                  exec:
                    command: ["sh", "-lc", "wget -qO- http://127.0.0.1:9222/json/version >/dev/null"]
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "bind": "lan",
                "mode": "local",
                "controlUi": {
                  "allowedOrigins": [
                    "https://openclaw.hexagonlabs.cloud",
                    "http://openclaw.hexagonlabs.cloud",
                    "http://localhost:18789",
                    "http://127.0.0.1:18789"
                  ]
                }
              },
              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "openai/gpt-5.2"
                  },
                  "userTimezone": "America/New_York",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 1
                }
              },
              "channels": {
                "whatsapp": {
                  "dmPolicy": "pairing"
                }
              },
              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "remoteCdpTimeoutMs": 30000,
                "remoteCdpHandshakeTimeoutMs": 15000,
                "profiles": {
                  "default": {
                    "cdpUrl": "http://127.0.0.1:9222",
                    "color": "#4285F4"
                  }
                }
              },
              "tools": {
                "deny": []
              }
            }

    service:
      main:
        type: ClusterIP
        ports:
          http:
            port: 18789

    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          kubernetes.io/ingress.class: traefik
        hosts:
          - host: openclaw.hexagonlabs.cloud
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
                  port: 18789

    persistence:
      data:
        enabled: true
        size: 5Gi
        advancedMounts:
          main:
            init-playwright:
              - path: /home/node/.openclaw
            main:
              - path: /home/node/.openclaw

      tmp:
        enabled: true
        advancedMounts:
          main:
            init-playwright:
              - path: /tmp
            main:
              - path: /tmp
            chromium:
              - path: /tmp

      shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          main:
            chromium:
              - path: /dev/shm