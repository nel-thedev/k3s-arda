openclaw:
  app-template:
    configMode: merge

    controllers:
      main:
        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env

          chromium:
            enabled: true

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "bind": "lan",
                "mode": "local",
                "controlUi": {
                  "allowedOrigins": [
                    "https://openclaw.hexagonlabs.cloud",
                    "http://openclaw.hexagonlabs.cloud",
                    "http://localhost:18789",
                    "http://127.0.0.1:18789"
                  ]
                }
              },

              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "openai/gpt-5.2"
                  },
                  "userTimezone": "America/New_York",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 1
                }
              },

              "channels": {
                "whatsapp": {
                  "selfChatMode": true,
                  "dmPolicy": "pairing"
                }
              }
            }

    service:
      main:
        ports:
          http:
            port: 18789

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        size: 5Gi

      tmp:
        enabled: true