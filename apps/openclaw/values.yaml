openclaw:
  app-template:
    configMode: merge

    controllers:
      main:
        initContainers:
          init-playwright:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "{{ .Values.openclawVersion }}"
            command:
              - sh
              - -c
              - |
                log() { echo "[$(date -Iseconds)] [init-playwright] $*"; }

                log "Installing Playwright into PVC (idempotent)"
                export HOME=/tmp
                export NPM_CONFIG_CACHE=/tmp/.npm
                export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

                mkdir -p /home/node/.openclaw
                cd /home/node/.openclaw

                if [ ! -d node_modules/playwright ]; then
                  npm init -y >/dev/null 2>&1 || true
                  npm install playwright
                  log "Playwright installed"
                else
                  log "Playwright already present"
                fi
            env:
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm
              PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env
            env:
              NODE_PATH: /home/node/.openclaw/node_modules

          # CDP Chromium sidecar (headless)
          chromium:
            enabled: true
            image:
              repository: zenika/alpine-chrome
              tag: latest

            env:
              # Force Chromium + crashpad to use writable dirs (common fix in restricted container envs)
              XDG_CONFIG_HOME: /tmp/.chromium
              XDG_CACHE_HOME: /tmp/.chromium-cache
              HOME: /tmp

            command:
              - sh
              - -lc
              - |
                set -e

                # Make sure all dirs exist and are writable
                mkdir -p /tmp/.chromium /tmp/.chromium-cache /tmp/chrome-profile
                chmod -R 777 /tmp/.chromium /tmp/.chromium-cache /tmp/chrome-profile || true

                exec chromium-browser \
                  --headless=new \
                  --disable-gpu \
                  --no-sandbox \
                  --disable-dev-shm-usage \
                  --remote-debugging-address=0.0.0.0 \
                  --remote-debugging-port=9222 \
                  --user-data-dir=/tmp/chrome-profile

            ports:
              - name: cdp
                containerPort: 9222

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "bind": "lan",
                "mode": "local",
                "controlUi": {
                  "allowedOrigins": [
                    "https://openclaw.hexagonlabs.cloud",
                    "http://openclaw.hexagonlabs.cloud",
                    "http://localhost:18789",
                    "http://127.0.0.1:18789"
                  ]
                }
              },
              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "openai/gpt-5.2"
                  },
                  "userTimezone": "America/New_York",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 1
                }
              },
              "channels": {
                "whatsapp": {
                  "selfChatMode": true,
                  "dmPolicy": "pairing"
                }
              },
              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "remoteCdpTimeoutMs": 30000,
                "remoteCdpHandshakeTimeoutMs": 15000,
                "profiles": {
                  "default": {
                    "cdpUrl": "http://127.0.0.1:9222",
                    "color": "#4285F4"
                  }
                }
              },
              "tools": {
                "deny": []
              }
            }

    # Service: expose ONLY the OpenClaw gateway (18789)
    # (No noVNC; CDP stays internal to the pod)
    service:
      main:
        # type: NodePort
        ports:
          http:
            port: 18789

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        size: 5Gi
        advancedMounts:
          main:
            init-playwright:
              - path: /home/node/.openclaw
            main:
              - path: /home/node/.openclaw

      tmp:
        enabled: true
        advancedMounts:
          main:
            init-playwright:
              - path: /tmp
            main:
              - path: /tmp
            chromium:
              - path: /tmp

      shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          main:
            chromium:
              - path: /dev/shm