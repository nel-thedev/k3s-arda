openclaw:
  app-template:
    configMode: merge

    controllers:
      main:
        initContainers:
          init-playwright:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "{{ .Values.openclawVersion }}"
            command:
              - sh
              - -c
              - |
                log() { echo "[$(date -Iseconds)] [init-playwright] $*"; }

                log "Installing Playwright into PVC (idempotent)"
                export HOME=/tmp
                export NPM_CONFIG_CACHE=/tmp/.npm

                cd /home/node/.openclaw

                if [ ! -d node_modules/playwright ]; then
                  npm init -y >/dev/null 2>&1 || true
                  npm install playwright
                  log "Playwright installed"
                else
                  log "Playwright already present"
                fi
            env:
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm

        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env
            env:
              NODE_PATH: /home/node/.openclaw/node_modules

          chromium:
            enabled: true
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "bind": "lan",
                "mode": "local",
                "controlUi": {
                  "allowedOrigins": [
                    "https://openclaw.hexagonlabs.cloud",
                    "http://openclaw.hexagonlabs.cloud",
                    "http://localhost:18789",
                    "http://127.0.0.1:18789"
                  ]
                }
              },

              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "openai/gpt-5.2"
                  },
                  "userTimezone": "America/New_York",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 1
                }
              },

              "channels": {
                "whatsapp": {
                  "selfChatMode": true,
                  "dmPolicy": "pairing"
                }
              },

              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "remoteCdpTimeoutMs": 30000,
                "remoteCdpHandshakeTimeoutMs": 15000,
                "profiles": {
                  "default": {
                    "cdpUrl": "http://127.0.0.1:9222",
                    "color": "#4285F4"
                  }
                }
              },

              "tools": {
                "deny": []
              }
            }

    service:
      main:
        ports:
          http:
            port: 18789

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        size: 5Gi

      tmp:
        enabled: true

      shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          main:
            chromium:
              - path: /dev/shm