openclaw:
  app-template:
    configMode: overwrite

    controllers:
      main:
        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env

          chromium:
            enabled: true

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "mode": "local",
                "controlUi": {
                  "allowedOrigins": [
                    "https://openclaw.hexagonlabs.cloud",
                    "http://openclaw.hexagonlabs.cloud",
                    "http://localhost:18789",
                    "http://127.0.0.1:18789"
                  ]
                },
                "trustedProxies": ["10.0.0.1"]
              },

              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "profiles": {
                  "default": {
                    "cdpUrl": "http://localhost:9222",
                    "color": "#4285F4"
                  }
                }
              }
            }

    service:
      main:
        ports:
          http:
            port: 18789

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        size: 5Gi

      tmp:
        enabled: true